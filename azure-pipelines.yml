trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "20.x"
  # Set these in Azure DevOps Pipeline Variables (not in code):
  #   AZURE_SUBSCRIPTION: your Azure service connection name
  #   APP_SERVICE_NAME: your App Service resource name
  #   COOKBOOK_LLM_API_KEY: LLM API key (mark as secret)

stages:
  - stage: Build
    displayName: "Build"
    jobs:
      - job: BuildApp
        displayName: "Build Prompt Cookbook"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js"

          - script: npm install
            displayName: "Install dependencies"

          - script: npm run build
            displayName: "Build application"

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
              includeRootFolder: false
              archiveType: "zip"
              archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
              replaceExistingArchive: true
            displayName: "Archive build output"

          - publish: "$(Build.ArtifactStagingDirectory)/app.zip"
            artifact: drop
            displayName: "Publish artifact"

  - stage: Deploy
    displayName: "Deploy"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployApp
        displayName: "Deploy to Azure App Service"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appType: "webAppLinux"
                    appName: $(APP_SERVICE_NAME)
                    package: "$(Pipeline.Workspace)/drop/app.zip"
                    runtimeStack: "NODE|20-lts"
                    startUpCommand: "npm start"
                  displayName: "Deploy to App Service"
